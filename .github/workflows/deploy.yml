name: Deploy VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script_stop: true
          script: |
            set -e

            cd /var/www/lineadigioco
            git fetch origin main
            git reset --hard origin/main

            cd /var/www/lineadigioco/webapp
            composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev
            npm ci
            npm run build
            php artisan migrate --force
            php artisan optimize:clear
            php artisan config:cache
            php artisan queue:restart

            cd /var/www/lineadigioco/ai
            if [ ! -d venv ]; then
              python3 -m venv venv
            fi
            ./venv/bin/pip install --upgrade pip
            ./venv/bin/pip install -r requirements.txt

            if systemctl list-unit-files | grep -q '^ai\.service'; then
              sudo systemctl restart ai.service
            fi

            if systemctl list-unit-files | grep -q '^laravel-queue\.service'; then
              sudo systemctl restart laravel-queue.service
            fi
